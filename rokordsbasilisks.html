<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rokords Basilisks</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 12px;
  z-index: 1000;
}

button {
  background: #111;
  color: #ff0033;
  border: 1px solid #ff0033;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 6px;
}

/* RANDOM VIEW */
#randomView {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

#mainImg {
  width: min(85vw, 700px);
  max-height: 80vh;
  object-fit: contain;
  box-shadow: 0 0 40px rgba(255,0,51,0.4);
  border-radius: 12px;
}

/* GALLERY */
#gallery {
  display: none;
  height: 100vh;
  overflow-y: auto;
  padding: 80px 20px 40px;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.thumb {
  width: 110px;
  height: 110px;
  object-fit: cover;
  cursor: pointer;
  border: 1px solid #222;
  transition: 0.2s;
}

.thumb:hover {
  transform: scale(1.08);
  border-color: #ff0033;
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.97);
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

#modal img {
  width: min(95vw, 1000px);
  max-height: 90vh;
  object-fit: contain;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <button id="viewBtn" onclick="toggleGallery()">View All</button>
  <button id="backBtn" onclick="toggleRandom()" style="display:none;">Back</button>
</div>

<!-- RANDOM VIEW -->
<div id="randomView">
  <img id="mainImg" />

  <div style="margin-top:20px;">
    <button onclick="randomFlick()">Random</button>
  </div>
</div>

<!-- GALLERY -->
<div id="gallery"></div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
  <img id="modalImg" />
</div>

<script>

const total = 69;
let current = 1;

/* IMAGE PATH (rb01.gif → rb69.gif in ROOT) */
function img(n){
  return `rb${String(n).padStart(2,'0')}.gif`;
}

/* preload images */
for(let i=1;i<=total;i++){
  const im = new Image();
  im.src = img(i);
}

/* show image */
function show(n){
  current = n;
  document.getElementById("mainImg").src = img(current);
}

/* RANDOM FLICKER EFFECT */
function randomFlick(){
  let count = 12;

  const interval = setInterval(() => {
    current = Math.floor(Math.random()*total)+1;
    document.getElementById("mainImg").src = img(current);

    count--;
    if(count <= 0){
      clearInterval(interval);
      show(current);
    }
  }, 50);
}

/* navigation (optional) */
function next(){
  current = (current % total) + 1;
  show(current);
}

function prev(){
  current = (current - 2 + total) % total + 1;
  show(current);
}

/* gallery */
function buildGallery(){
  const g = document.getElementById("gallery");
  g.innerHTML = "";

  for(let i=1;i<=total;i++){
    const im = document.createElement("img");
    im.src = img(i);
    im.className = "thumb";
    im.onclick = () => openModal(i);
    g.appendChild(im);
  }
}

/* modal */
function openModal(i){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src = img(i);
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* view switch */
function toggleGallery(){
  document.getElementById("randomView").style.display="none";
  document.getElementById("gallery").style.display="flex";

  document.getElementById("viewBtn").style.display="none";
  document.getElementById("backBtn").style.display="inline-block";

  buildGallery();
}

function toggleRandom(){
  document.getElementById("gallery").style.display="none";
  document.getElementById("randomView").style.display="flex";

  document.getElementById("viewBtn").style.display="inline-block";
  document.getElementById("backBtn").style.display="none";

  show(current);
}

/* init */
show(Math.floor(Math.random()*total)+1);

</script>

</body>
</html>
