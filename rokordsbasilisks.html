<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rokords Basilisks</title>

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
  font-family: Arial;
  color: #fff;
}

/* TITLE */
.title {
  text-align: center;
  padding-top: 18px;
  font-size: 20px;
  color: #ff0033;
  text-shadow: 0 0 10px #ff0033;
}

/* MAIN VIEWPORT */
.viewport {
  position: absolute;
  top: 60px;
  bottom: 60px;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* TRACK */
.track {
  display: flex;
  align-items: center;
  gap: 40px;
  will-change: transform;
  transition: transform 0.25s ease;
}

/* ITEM */
.item {
  flex: 0 0 auto;
  display: flex;
  justify-content: center;
  align-items: center;

  transform: scale(0.55);
  opacity: 0.35;
  transition: transform 0.35s ease, opacity 0.35s ease;
}

/* CENTER ITEM */
.item.active {
  transform: scale(1);
  opacity: 1;
}

/* IMAGE */
.item img {
  max-width: 70vw;
  max-height: 70vh;
  object-fit: contain;
  border-radius: 10px;
  background: #000;
  user-select: none;
  pointer-events: none;
}

/* SIDE IMAGES SMALLER FEEL */
.item:not(.active) img {
  max-width: 25vw;
  max-height: 25vh;
  filter: brightness(0.6);
}

/* INFO */
.info {
  position: absolute;
  bottom: 15px;
  width: 100%;
  text-align: center;
  color: #888;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="title">ROKORDS BASILISKS</div>

<div class="viewport">
  <div class="track" id="track"></div>
</div>

<div class="info">
  Basilisk <span id="index">1</span> / 69 — swipe / drag
</div>

<script>

const total = 69;
let current = 1;

/* momentum variables */
let velocity = 0;
let lastX = 0;
let dragging = false;

const track = document.getElementById("track");

/* build images */
for (let i = 1; i <= total; i++) {
  const item = document.createElement("div");
  item.className = "item";

  const img = document.createElement("img");
  img.src = `rb${String(i).padStart(2,'0')}.gif`;

  item.appendChild(img);
  track.appendChild(item);
}

const items = document.querySelectorAll(".item");

/* render */
function render() {

  items.forEach((el, i) => {
    el.classList.toggle("active", i === current - 1);
  });

  document.getElementById("index").innerText = current;

  const centerOffset = window.innerWidth / 2 - (current - 1) * 300;
  track.style.transform = `translateX(${centerOffset}px)`;
}

/* navigation */
function next() {
  current = current % total + 1;
  render();
}

function prev() {
  current = (current - 2 + total) % total + 1;
  render();
}

/* momentum loop */
function momentum() {
  if (Math.abs(velocity) > 0.5 && !dragging) {
    if (velocity < 0) next();
    else prev();

    velocity *= 0.85;
  }
  requestAnimationFrame(momentum);
}
momentum();

/* TOUCH */
document.addEventListener("touchstart", e => {
  lastX = e.touches[0].clientX;
  velocity = 0;
  dragging = true;
});

document.addEventListener("touchmove", e => {
  const x = e.touches[0].clientX;
  velocity = x - lastX;
  lastX = x;
});

document.addEventListener("touchend", () => {
  dragging = false;

  if (velocity < -10) next();
  if (velocity > 10) prev();
});

/* MOUSE */
document.addEventListener("mousedown", e => {
  lastX = e.clientX;
  velocity = 0;
  dragging = true;
});

document.addEventListener("mousemove", e => {
  if (!dragging) return;
  velocity = e.clientX - lastX;
  lastX = e.clientX;
});

document.addEventListener("mouseup", () => {
  dragging = false;

  if (velocity < -10) next();
  if (velocity > 10) prev();
});

/* keyboard */
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
});

/* init */
render();

</script>

</body>
</html>
