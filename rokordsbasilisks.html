<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rokords Basilisks</title>
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  z-index: 1000;
  background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
}

.topbar-title {
  font-size: 13px;
  letter-spacing: 0.15em;
  color: #ff0033;
  text-transform: uppercase;
  opacity: 0.7;
  user-select: none;
}

button {
  background: transparent;
  color: #ff0033;
  border: 1px solid #ff0033;
  padding: 7px 16px;
  cursor: pointer;
  border-radius: 4px;
  font-size: 13px;
  letter-spacing: 0.08em;
  transition: background 0.15s, box-shadow 0.15s;
}

button:hover {
  background: rgba(255, 0, 51, 0.12);
  box-shadow: 0 0 8px rgba(255, 0, 51, 0.35);
}

button:active {
  background: rgba(255, 0, 51, 0.22);
}

/* RANDOM VIEW */
#randomView {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* MAIN IMAGE */
#mainImg {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  padding: 70px 20px 90px;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;
  image-rendering: pixelated;
}

/* RANDOM BUTTON */
#randomControls {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 500;
}

#randomControls button {
  padding: 9px 28px;
  font-size: 14px;
  letter-spacing: 0.12em;
}

/* GALLERY */
#gallery {
  display: none;
  position: fixed;
  top: 52px;
  left: 0;
  right: 0;
  bottom: 0;
  overflow-y: auto;
  flex-wrap: wrap;
  justify-content: center;
  align-content: flex-start;
  gap: 8px;
  padding: 12px;
}

/* custom scrollbar */
#gallery::-webkit-scrollbar { width: 6px; }
#gallery::-webkit-scrollbar-track { background: #111; }
#gallery::-webkit-scrollbar-thumb { background: #ff0033; border-radius: 3px; }

/* THUMBNAILS */
.thumb {
  width: clamp(70px, 8vw, 110px);
  height: clamp(70px, 8vw, 110px);
  object-fit: cover;
  cursor: pointer;
  border: 1px solid #222;
  background: #000;
  transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;
}

.thumb:hover {
  transform: scale(1.1);
  border-color: #ff0033;
  box-shadow: 0 0 10px rgba(255, 0, 51, 0.4);
}

/* MODAL OVERLAY */
#modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.97);
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

/* LOGO IN MODAL */
#modalLogo {
  margin-bottom: 8px;
  user-select: none;
  position: relative;
  display: inline-block;
}

#modalLogo img {
  height: clamp(36px, 5vw, 60px);
  width: auto;
  display: block;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;
  padding: 0;
  flex: none;
  max-height: none;
  object-fit: unset;
}

/* GLITCH LAYERS */
#modalLogo::before,
#modalLogo::after {
  content: '';
  position: absolute;
  inset: 0;
  background: url('logo.png') no-repeat center/contain;
  height: clamp(36px, 5vw, 60px);
  width: 100%;
  opacity: 0;
}

#modalLogo::before {
  animation: glitch-r 4s infinite steps(1);
  mix-blend-mode: screen;
  filter: hue-rotate(0deg) saturate(5);
}

#modalLogo::after {
  animation: glitch-b 4s infinite steps(1);
  mix-blend-mode: screen;
  filter: hue-rotate(180deg) saturate(5);
}

@keyframes glitch-r {
  0%,89%,100% { opacity:0; transform:translate(0,0); }
  90%  { opacity:0.85; transform:translate(-3px, 1px) scaleY(1.01); clip-path:inset(20% 0 60% 0); }
  92%  { opacity:0; }
  94%  { opacity:0.7; transform:translate(3px,-1px); clip-path:inset(55% 0 10% 0); }
  96%  { opacity:0; }
  98%  { opacity:0.9; transform:translate(-2px,2px); clip-path:inset(70% 0 5% 0); }
}

@keyframes glitch-b {
  0%,89%,100% { opacity:0; transform:translate(0,0); }
  91%  { opacity:0.75; transform:translate(3px,-1px); clip-path:inset(5% 0 70% 0); }
  93%  { opacity:0; }
  95%  { opacity:0.8; transform:translate(-3px,1px) scaleY(0.99); clip-path:inset(40% 0 30% 0); }
  97%  { opacity:0; }
  99%  { opacity:0.85; transform:translate(2px,1px); clip-path:inset(80% 0 2% 0); }
}

/* MODAL IMAGE */
#modalImg {
  flex: 1;
  width: 100vw;
  max-height: calc(100vh - 100px);
  object-fit: contain;
  padding: 10px 30px 30px;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;
  image-rendering: pixelated;
}

/* click hint */
#modalHint {
  position: fixed;
  bottom: 14px;
  font-size: 11px;
  color: #444;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  pointer-events: none;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <button id="viewBtn" onclick="toggleGallery()">View All</button>
  <div class="topbar-title">Rokords <span style="opacity:0.4">·</span> Basilisks</div>
  <button id="backBtn" onclick="toggleRandom()" style="display:none;">← Back</button>
</div>

<!-- RANDOM VIEW -->
<div id="randomView">
  <img id="mainImg" />
</div>

<!-- RANDOM BUTTON -->
<div id="randomControls">
  <button onclick="randomFlick()">&#9654; Random</button>
</div>

<!-- GALLERY -->
<div id="gallery"></div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
  <div id="modalLogo"><img src="logo.png" alt="Rokords Basilisks" /></div>
  <img id="modalImg" />
  <div id="modalHint">click anywhere to close</div>
</div>

<script>

const total = 69;
let current = 1;

function img(n){
  return `rb${String(n).padStart(2,'0')}.gif`;
}

/* PRELOAD */
for(let i=1;i<=total;i++){
  const im = new Image();
  im.src = img(i);
}

function show(n){
  current = n;
  document.getElementById("mainImg").src = img(current);
}

/* RANDOM FLICK EFFECT */
function randomFlick(){
  let count = 12;
  let delay = 40;

  function tick(){
    current = Math.floor(Math.random()*total)+1;
    document.getElementById("mainImg").src = img(current);
    count--;
    if(count > 0){
      delay += 8;
      setTimeout(tick, delay);
    }
  }
  tick();
}

/* GALLERY BUILD */
function buildGallery(){
  const g = document.getElementById("gallery");
  g.innerHTML = "";
  for(let i=1;i<=total;i++){
    const im = document.createElement("img");
    im.src = img(i);
    im.className = "thumb";
    im.onclick = (e) => { e.stopPropagation(); openModal(i); };
    g.appendChild(im);
  }
}

/* MODAL */
function openModal(i){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalImg").src = img(i);
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* SWITCH TO GALLERY */
function toggleGallery(){
  document.getElementById("randomView").style.display = "none";
  document.getElementById("randomControls").style.display = "none";
  document.getElementById("gallery").style.display = "flex";
  document.getElementById("viewBtn").style.display = "none";
  document.getElementById("backBtn").style.display = "inline-block";
  buildGallery();
}

/* SWITCH BACK TO RANDOM */
function toggleRandom(){
  document.getElementById("gallery").style.display = "none";
  document.getElementById("randomView").style.display = "flex";
  document.getElementById("randomControls").style.display = "block";
  document.getElementById("viewBtn").style.display = "inline-block";
  document.getElementById("backBtn").style.display = "none";
  show(current);
}

/* KEYBOARD: ESC closes modal */
document.addEventListener("keydown", (e) => {
  if(e.key === "Escape") closeModal();
});

show(Math.floor(Math.random()*total)+1);

</script>
</body>
</html>
