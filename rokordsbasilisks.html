<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rokords Basilisks</title>

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
  font-family: Arial;
  color: #fff;
}

/* TITLE */
.title {
  text-align: center;
  padding-top: 18px;
  font-size: 20px;
  color: #ff0033;
  text-shadow: 0 0 10px #ff0033;
}

/* VIEWPORT */
.viewport {
  position: absolute;
  top: 60px;
  bottom: 60px;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  perspective: 1200px;
}

/* WHEEL */
.wheel {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
}

/* ITEMS */
.item {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: center;
  transition: transform 0.2s linear;
}

/* IMAGE */
.item img {
  border-radius: 12px;
  background: #000;
  user-select: none;
  pointer-events: none;
  box-shadow: 0 0 25px rgba(255,0,50,0.15);
}

/* CENTER EMPHASIS (applied dynamically) */
.center img {
  filter: none;
}

/* SIDE DIMMING */
.item img {
  filter: brightness(0.6);
}

/* INFO */
.info {
  position: absolute;
  bottom: 15px;
  width: 100%;
  text-align: center;
  color: #888;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="title">ROKORDS BASILISKS</div>

<div class="viewport">
  <div class="wheel" id="wheel"></div>
</div>

<div class="info">
  Basilisk <span id="index">1</span> / 69 — hold + drag
</div>

<script>

const total = 69;

/* rotation state */
let rotation = 0;
let velocity = 0;
let dragging = false;
let lastX = 0;

const wheel = document.getElementById("wheel");

/* build circular layout */
const radius = 600;   // distance from center
const angleStep = 360 / total;

/* create items */
for (let i = 0; i < total; i++) {
  const item = document.createElement("div");
  item.className = "item";

  const img = document.createElement("img");
  img.src = `rb${String(i+1).padStart(2,'0')}.gif`;

  item.appendChild(img);
  wheel.appendChild(item);
}

const items = document.querySelectorAll(".item");

/* render wheel */
function render() {

  items.forEach((el, i) => {

    const angle = i * angleStep + rotation;

    const rad = angle * Math.PI / 180;

    const x = Math.sin(rad) * radius;
    const z = Math.cos(rad) * radius;

    el.style.transform = `
      translate(-50%, -50%)
      translateX(${x}px)
      translateZ(${z}px)
      rotateY(${angle}deg)
      scale(${z > 0 ? 1.6 : 0.6})
    `;

    /* center detection (closest to front) */
    if (Math.abs(((angle % 360) + 360) % 360) < 8) {
      el.classList.add("center");
      el.style.zIndex = 999;
    } else {
      el.classList.remove("center");
      el.style.zIndex = 1;
    }
  });

  document.getElementById("index").innerText =
    Math.abs(Math.round(rotation / angleStep) % total) + 1;
}

/* animation loop (momentum) */
function animate() {
  if (!dragging) {
    rotation += velocity;
    velocity *= 0.95; // friction
  }

  render();
  requestAnimationFrame(animate);
}
animate();

/* TOUCH */
document.addEventListener("touchstart", e => {
  dragging = true;
  lastX = e.touches[0].clientX;
  velocity = 0;
});

document.addEventListener("touchmove", e => {
  const x = e.touches[0].clientX;
  velocity = (x - lastX) * 0.3;
  rotation += velocity;
  lastX = x;
});

/* MOUSE */
document.addEventListener("mousedown", e => {
  dragging = true;
  lastX = e.clientX;
  velocity = 0;
});

document.addEventListener("mousemove", e => {
  if (!dragging) return;
  const x = e.clientX;
  velocity = (x - lastX) * 0.3;
  rotation += velocity;
  lastX = x;
});

document.addEventListener("mouseup", () => {
  dragging = false;
});

/* keyboard */
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") velocity += 5;
  if (e.key === "ArrowLeft") velocity -= 5;
});

</script>

</body>
</html>
