<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rokords Basilisks</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial;
  color: #fff;
  overflow-x: hidden;
}

/* TITLE */
.title {
  text-align: center;
  padding: 18px;
  font-size: 20px;
  color: #ff0033;
  text-shadow: 0 0 10px #ff0033;
}

/* RANDOM VIEW */
.viewer {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 85vh;
}

/* MAIN IMAGE (FULL FOCUS) */
.main-img {
  width: 90vw;
  height: 80vh;
  object-fit: contain;
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(255,0,50,0.35);
  background: #000;
}

/* BUTTONS */
.controls {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

button {
  background: #111;
  border: 1px solid #ff0033;
  color: #ff0033;
  padding: 10px 14px;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  background: #ff0033;
  color: #000;
}

/* GRID MODE */
.grid {
  display: none;
  padding: 15px;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.grid img {
  width: 120px;
  cursor: pointer;
  border-radius: 8px;
  transition: transform 0.2s;
}

.grid img:hover {
  transform: scale(1.08);
}

/* FULLSCREEN VIEWER */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  align-items: center;
  justify-content: center;
}

.modal img {
  max-width: 92vw;
  max-height: 90vh;
}

.close {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 28px;
  cursor: pointer;
}

/* BACK BUTTON (GRID MODE) */
.back-btn {
  display: none;
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 10;
}
</style>
</head>

<body>

<div class="title">ROKORDS BASILISKS</div>

<!-- RANDOM MODE -->
<div id="randomView" class="viewer">
  <img id="mainImg" class="main-img">

  <div class="controls">
    <button onclick="randomGif()">Next Random</button>
    <button onclick="showGrid()">View All</button>
  </div>
</div>

<!-- GRID MODE -->
<button id="backBtn" class="back-btn" onclick="backToRandom()">⬅ Back</button>

<div id="grid" class="grid"></div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
  <span class="close">✕</span>
  <img id="modalImg">
</div>

<script>

const total = 69;

function img(n){
  return `rb${String(n).padStart(2,'0')}.gif`;
}

/* RANDOM IMAGE */
function randomGif(){
  const i = Math.floor(Math.random() * total) + 1;
  document.getElementById("mainImg").src = img(i);
}

/* INIT RANDOM */
randomGif();

/* GRID BUILD */
const grid = document.getElementById("grid");

for(let i=1;i<=total;i++){
  const im = document.createElement("img");
  im.src = img(i);

  im.onclick = () => {
    document.getElementById("modalImg").src = img(i);
    document.getElementById("modal").style.display = "flex";
  };

  grid.appendChild(im);
}

/* SHOW GRID MODE */
function showGrid(){
  document.getElementById("randomView").style.display = "none";
  document.getElementById("grid").style.display = "flex";
  document.getElementById("backBtn").style.display = "block";
}

/* BACK TO RANDOM */
function backToRandom(){
  document.getElementById("randomView").style.display = "flex";
  document.getElementById("grid").style.display = "none";
  document.getElementById("backBtn").style.display = "none";
}

/* MODAL */
function closeModal(){
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
