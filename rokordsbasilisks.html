<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rokords Basilisks</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 12px;
  z-index: 1000;
}

button {
  background: #111;
  color: #ff0033;
  border: 1px solid #ff0033;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 6px;
}

/* RANDOM VIEW */
#randomView {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

#mainImg {
  width: min(85vw, 750px);
  height: auto;
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(255,0,51,0.35);
}

/* GALLERY */
#gallery {
  display: none;
  padding: 90px 15px 40px;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

.thumb {
  width: 120px;
  height: 120px;
  object-fit: cover;
  cursor: pointer;
  transition: 0.2s;
  border: 1px solid #222;
}

.thumb:hover {
  transform: scale(1.15);
  border-color: #ff0033;
}

/* MODAL (FULLSCREEN VIEWER) */
#modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.98);
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

#modal img {
  width: 95vw;
  height: 95vh;
  object-fit: contain;
  box-shadow: 0 0 50px rgba(255,0,51,0.25);
}

/* fade effect */
.fade {
  animation: fade 0.15s ease;
}

@keyframes fade {
  from { opacity: 0.3; }
  to { opacity: 1; }
}
</style>
</head>

<body>

<!-- TOP BUTTONS -->
<div class="topbar">
  <button onclick="toggleGallery()">View All</button>
  <button onclick="toggleRandom()">Back</button>
</div>

<!-- RANDOM MODE -->
<div id="randomView">
  <img id="mainImg">
  <div style="margin-top:20px;">
    <button onclick="prev()">◀</button>
    <button onclick="next()">▶</button>
    <button onclick="randomSpin()">Random</button>
  </div>
</div>

<!-- GALLERY -->
<div id="gallery"></div>

<!-- FULLSCREEN MODAL -->
<div id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>

const total = 69;
let current = 1;

/* IMAGE PATH */
function img(n){
  return `images/rb${String(n).padStart(2,'0')}.gif`;
}

/* preload */
for(let i=1;i<=total;i++){
  const im = new Image();
  im.src = img(i);
}

/* SHOW IMAGE */
function show(n){
  const el = document.getElementById("mainImg");

  el.classList.remove("fade");
  void el.offsetWidth;
  el.classList.add("fade");

  current = n;
  el.src = img(n);
}

/* NORMAL NAV */
function next(){
  current++;
  if(current > total) current = 1;
  show(current);
}

function prev(){
  current--;
  if(current < 1) current = total;
  show(current);
}

/* GLITCH RANDOM SPIN */
function randomSpin(){
  let steps = 15 + Math.floor(Math.random() * 10);
  let speed = 40;

  let interval = setInterval(() => {
    const r = Math.floor(Math.random() * total) + 1;
    document.getElementById("mainImg").src = img(r);
  }, speed);

  setTimeout(() => {
    clearInterval(interval);
    const final = Math.floor(Math.random() * total) + 1;
    show(final);
  }, steps * speed);
}

/* GALLERY */
function buildGallery(){
  const g = document.getElementById("gallery");
  g.innerHTML = "";

  for(let i=1;i<=total;i++){
    const im = document.createElement("img");
    im.src = img(i);
    im.className = "thumb";
    im.onclick = () => openModal(i);
    g.appendChild(im);
  }
}

/* MODAL (FULLSCREEN VIEW) */
function openModal(i){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalImg").src = img(i);
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* TOGGLES */
function toggleGallery(){
  document.getElementById("randomView").style.display = "none";
  document.getElementById("gallery").style.display = "flex";
  buildGallery();
}

function toggleRandom(){
  document.getElementById("gallery").style.display = "none";
  document.getElementById("randomView").style.display = "flex";
  show(current);
}

/* INIT */
show(Math.floor(Math.random()*total)+1);

</script>

</body>
</html>
