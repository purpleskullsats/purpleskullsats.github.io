<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rokords Basilisks</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #eee;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* Title */
.title {
  text-align: center;
  margin-top: 18px;
  font-size: 20px;
  color: #ff0033;
  text-shadow: 0 0 10px #ff0033;
}

/* CAMERA ROLL WRAPPER */
.viewer {
  position: absolute;
  top: 60px;
  bottom: 60px;
  width: 100%;
  display: flex;
  align-items: center;
  overflow: hidden;
}

/* TRACK */
.track {
  display: flex;
  align-items: center;
  transition: transform 0.35s ease;
  will-change: transform;
}

/* EACH IMAGE */
.item {
  flex: 0 0 auto;
  width: 70vw;
  max-width: 700px;
  margin: 0 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: transform 0.35s ease, opacity 0.35s ease;
  opacity: 0.3;
  transform: scale(0.85);
}

/* ACTIVE CENTER */
.item.active {
  opacity: 1;
  transform: scale(1);
}

.item img {
  width: 100%;
  height: auto;
  border-radius: 12px;
  background: #000;
  box-shadow: 0 0 25px rgba(255,0,50,0.25);
  user-select: none;
  pointer-events: none;
}

/* INFO */
.info {
  position: absolute;
  bottom: 18px;
  width: 100%;
  text-align: center;
  color: #888;
  font-size: 14px;
}

</style>
</head>

<body>

<div class="title">ROKORDS BASILISKS</div>

<div class="viewer">
  <div class="track" id="track"></div>
</div>

<div class="info">
  Basilisk <span id="index">1</span> / 69 — Swipe / Drag
</div>

<script>
const total = 69;
let current = 1;

const track = document.getElementById("track");

/* build gallery */
for (let i = 1; i <= total; i++) {
  const div = document.createElement("div");
  div.className = "item";

  const img = document.createElement("img");
  img.src = `rb${String(i).padStart(2,'0')}.gif`;

  div.appendChild(img);
  track.appendChild(div);
}

const items = document.querySelectorAll(".item");

/* update view */
function render() {
  items.forEach((el, i) => {
    el.classList.toggle("active", i === current - 1);
  });

  document.getElementById("index").innerText = current;

  const offset = window.innerWidth / 2 - (current - 1) * (window.innerWidth * 0.75);
  track.style.transform = `translateX(${offset}px)`;
}

/* navigation */
function next() {
  current = current % total + 1;
  render();
}

function prev() {
  current = (current - 1 + total - 1) % total + 1;
  render();
}

/* swipe / drag */
let startX = 0;
let dragging = false;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  dragging = true;
});

document.addEventListener("touchend", e => {
  if (!dragging) return;
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 40) next();
  if (endX - startX > 40) prev();

  dragging = false;
});

/* mouse drag */
document.addEventListener("mousedown", e => {
  startX = e.clientX;
  dragging = true;
});

document.addEventListener("mouseup", e => {
  if (!dragging) return;

  let endX = e.clientX;

  if (startX - endX > 40) next();
  if (endX - startX > 40) prev();

  dragging = false;
});

/* keyboard */
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
});

/* init */
render();
</script>

</body>
</html>
