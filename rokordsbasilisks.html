<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rokords Basilisks</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial;
  color: #fff;
  overflow-x: hidden;
}

/* HEADER */
.title {
  text-align: center;
  padding: 18px;
  font-size: 20px;
  color: #ff0033;
  text-shadow: 0 0 10px #ff0033;
}

/* MAIN VIEW */
.viewer {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 70vh;
}

/* MAIN IMAGE */
.main-img {
  max-width: 80vw;
  max-height: 70vh;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(255,0,50,0.25);
  background: #000;
}

/* BUTTONS */
.controls {
  margin-top: 20px;
  display: flex;
  gap: 15px;
}

button {
  background: #111;
  border: 1px solid #ff0033;
  color: #ff0033;
  padding: 10px 16px;
  cursor: pointer;
  border-radius: 6px;
  font-size: 14px;
}

button:hover {
  background: #ff0033;
  color: #000;
}

/* GRID */
.grid {
  display: none;
  padding: 20px;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.grid img {
  width: 120px;
  height: auto;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.2s;
}

.grid img:hover {
  transform: scale(1.1);
}

/* FULLSCREEN VIEWER */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.modal img {
  max-width: 90vw;
  max-height: 85vh;
}

.close {
  position: absolute;
  top: 20px;
  right: 25px;
  font-size: 30px;
  color: #fff;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="title">ROKORDS BASILISKS</div>

<div class="viewer">
  <img id="mainImg" class="main-img">
  
  <div class="controls">
    <button onclick="randomGif()">Next Random</button>
    <button onclick="toggleGrid()">View All</button>
  </div>
</div>

<!-- GRID VIEW -->
<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">✕</div>
  <img id="modalImg">
</div>

<script>

const total = 69;
let current = 1;

/* generate file name */
function img(n){
  return `rb${String(n).padStart(2,'0')}.gif`;
}

/* RANDOM MAIN VIEW */
function randomGif(){
  current = Math.floor(Math.random() * total) + 1;
  document.getElementById("mainImg").src = img(current);
}

/* BUILD GRID */
const grid = document.getElementById("grid");

for(let i=1;i<=total;i++){
  const im = document.createElement("img");
  im.src = img(i);

  im.onclick = () => {
    document.getElementById("modalImg").src = img(i);
    document.getElementById("modal").style.display = "flex";
  };

  grid.appendChild(im);
}

/* TOGGLE GRID */
function toggleGrid(){
  const g = document.getElementById("grid");
  g.style.display = g.style.display === "flex" ? "none" : "flex";
}

/* MODAL */
function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* INIT */
randomGif();

</script>

</body>
</html>
