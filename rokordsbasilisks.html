<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rokords Basilisks</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 12px;
  z-index: 1000;
}

button {
  background: #111;
  color: #ff0033;
  border: 1px solid #ff0033;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 6px;
}

/* RANDOM VIEW */
#randomView {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

#mainImg {
  width: min(90vw, 900px);
  max-height: 80vh;
  object-fit: contain;
  box-shadow: 0 0 40px rgba(255,0,51,0.4);
  border-radius: 12px;
  image-rendering: auto;
}

.arrows {
  margin-top: 20px;
  display: flex;
  gap: 20px;
}

/* GALLERY */
#gallery {
  display: none;
  height: 100vh;
  overflow-y: auto;
  padding: 80px 20px 40px;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
}

.thumb {
  width: 110px;
  height: 110px;
  object-fit: cover;
  cursor: pointer;
  border: 1px solid #222;
  transition: 0.2s;
}

.thumb:hover {
  transform: scale(1.1);
  border-color: #ff0033;
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.97);
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

#modal img {
  width: min(95vw, 1000px);
  max-height: 90vh;
  object-fit: contain;
}

/* fade */
.fade {
  animation: fade 0.15s ease;
}

@keyframes fade {
  from {opacity: 0.2;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="toggleGallery()">View All</button>
  <button onclick="toggleRandom()">Back</button>
</div>

<!-- RANDOM VIEW -->
<div id="randomView">
  <img id="mainImg" class="fade" />
  <div class="arrows">
    <button onclick="prev()">◀</button>
    <button onclick="randomFlick()">Random</button>
    <button onclick="next()">▶</button>
  </div>
</div>

<!-- GALLERY -->
<div id="gallery"></div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
  <img id="modalImg" />
</div>

<script>

const total = 69;
let current = 1;

/* FIXED PATH */
function img(n){
  return `images/rb${String(n).padStart(2,'0')}.gif`;
}

/* preload */
for(let i=1;i<=total;i++){
  const im = new Image();
  im.src = img(i);
}

/* FAST RANDOM FLICKER EFFECT */
function randomFlick(){
  let flicks = 10;
  let interval = setInterval(() => {
    current = Math.floor(Math.random() * total) + 1;
    document.getElementById("mainImg").src = img(current);
    document.getElementById("mainImg").classList.remove("fade");
    void document.getElementById("mainImg").offsetWidth;
    document.getElementById("mainImg").classList.add("fade");

    flicks--;
    if(flicks <= 0){
      clearInterval(interval);
      show(current);
    }
  }, 60);
}

/* SHOW IMAGE */
function show(n){
  current = n;
  const el = document.getElementById("mainImg");
  el.classList.remove("fade");
  void el.offsetWidth;
  el.classList.add("fade");
  el.src = img(current);
}

/* NAV */
function next(){
  current = (current % total) + 1;
  show(current);
}

function prev(){
  current = (current - 2 + total) % total + 1;
  show(current);
}

/* GALLERY */
function buildGallery(){
  const g = document.getElementById("gallery");
  g.innerHTML = "";

  for(let i=1;i<=total;i++){
    const im = document.createElement("img");
    im.src = img(i);
    im.className = "thumb";
    im.onclick = () => openModal(i);
    g.appendChild(im);
  }
}

/* MODAL */
function openModal(i){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src = img(i);
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* VIEW TOGGLES */
function toggleGallery(){
  document.getElementById("randomView").style.display="none";
  document.getElementById("gallery").style.display="flex";
  buildGallery();
}

function toggleRandom(){
  document.getElementById("gallery").style.display="none";
  document.getElementById("randomView").style.display="flex";
  show(current);
}

/* INIT */
show(Math.floor(Math.random() * total) + 1);

</script>

</body>
</html>
