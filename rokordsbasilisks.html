<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rokords Basilisks</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 12px;
  z-index: 1000;
}

button {
  background: #111;
  color: #ff0033;
  border: 1px solid #ff0033;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 6px;
}

/* RANDOM VIEW */
#randomView {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* 🔥 FIXED IMAGE FIT */
#mainImg {
  width: 100vw;
  height: 100vh;
  object-fit: contain;   /* key fix */
  display: block;
  padding: 70px 20px 80px; /* top + bottom breathing room */
  box-sizing: border-box;
}

/* RANDOM BUTTON AREA */
#randomControls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

/* GALLERY */
#gallery {
  display: none;
  height: 100vh;
  overflow-y: auto;
  padding: 80px 20px 40px;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

/* 🔥 STATIC THUMBNAILS (NO ANIMATION) */
.thumb {
  width: 110px;
  height: 110px;
  object-fit: cover;
  cursor: pointer;
  border: 1px solid #222;
  background: #000;

  /* freeze frame style */
  image-rendering: auto;
}

.thumb:hover {
  transform: scale(1.08);
  border-color: #ff0033;
}

/* MODAL (FULL SCREEN GIF) */
#modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.97);
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

/* 🔥 FULL SCREEN VIEW */
#modal img {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  padding: 40px;
  box-sizing: border-box;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <button id="viewBtn" onclick="toggleGallery()">View All</button>
  <button id="backBtn" onclick="toggleRandom()" style="display:none;">Back</button>
</div>

<!-- RANDOM VIEW -->
<div id="randomView">
  <img id="mainImg" />
</div>

<!-- RANDOM BUTTON (BOTTOM CENTRE) -->
<div id="randomControls">
  <button onclick="randomFlick()">Random</button>
</div>

<!-- GALLERY -->
<div id="gallery"></div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
  <img id="modalImg" />
</div>

<script>

const total = 69;
let current = 1;

/* IMAGE PATH */
function img(n){
  return `rb${String(n).padStart(2,'0')}.gif`;
}

/* preload */
for(let i=1;i<=total;i++){
  const im = new Image();
  im.src = img(i);
}

/* SHOW */
function show(n){
  current = n;
  document.getElementById("mainImg").src = img(current);
}

/* FAST FLICK RANDOM EFFECT */
function randomFlick(){
  let count = 10;

  const interval = setInterval(() => {
    current = Math.floor(Math.random()*total)+1;
    document.getElementById("mainImg").src = img(current);

    count--;
    if(count <= 0){
      clearInterval(interval);
      show(current);
    }
  }, 60);
}

/* GALLERY */
function buildGallery(){
  const g = document.getElementById("gallery");
  g.innerHTML = "";

  for(let i=1;i<=total;i++){
    const im = document.createElement("img");
    im.src = img(i);
    im.className = "thumb";

    im.onclick = () => openModal(i);
    g.appendChild(im);
  }
}

/* MODAL (FULL SIZE GIF PLAY) */
function openModal(i){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src = img(i);
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* VIEW SWITCH */
function toggleGallery(){
  document.getElementById("randomView").style.display="none";
  document.getElementById("gallery").style.display="flex";

  document.getElementById("viewBtn").style.display="none";
  document.getElementById("backBtn").style.display="inline-block";

  buildGallery();
}

function toggleRandom(){
  document.getElementById("gallery").style.display="none";
  document.getElementById("randomView").style.display="flex";

  document.getElementById("viewBtn").style.display="inline-block";
  document.getElementById("backBtn").style.display="none";

  show(current);
}

/* INIT */
show(Math.floor(Math.random()*total)+1);

</script>

</body>
</html>
