<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Babes On Chain Collection</title>
  <style>
    body {
      background-color: #111;
      color: #eee;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    /* Bottom number text (optional series range) */
    .bottom-number {
      font-size: 1rem;
      color: #f44336;
      text-shadow: 0 0 4px #f44336;
      margin: 2rem 0 10px 0;
    }

    /* Home icon container */
    .home-icon-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .home-icon {
      width: 50px;
      height: 50px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .home-icon:hover {
      transform: scale(1.1);
    }

    /* Fixed title container */
    .title-container {
      position: fixed;
      top: 50px;
      left: 0;
      width: 100%;
      z-index: 0;
      text-align: center;
      pointer-events: none;
    }

    .title-img {
      max-width: 400px;
      width: 90%;
      height: auto;
      filter: drop-shadow(0 0 8px #f44336) drop-shadow(0 0 16px #f44336);
      transition: opacity 0.3s;
    }

    .content {
      margin-top: 220px;
      position: relative;
      z-index: 2;
    }

    /* Babe grid */
    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 0 1rem 1rem 1rem;
    }

    .babe {
      text-align: center;
    }

    .grid img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border: 2px solid #f44336;
      border-radius: 8px;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
      background: #111;
      box-shadow: 0 0 8px #f44336;
    }

    .grid img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #f44336;
    }

    .babe h2 {
      margin-top: 8px;
      font-size: 1.2rem;
      color: #f44336;
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      padding-top: 60px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.95);
    }

    .modal-content {
      margin: auto;
      display: block;
      max-width: 80%;
      max-height: 80%;
      border: 2px solid #f44336;
      border-radius: 8px;
      box-shadow: 0 0 20px #f44336;
      transition: transform 0.3s;
    }

    .close {
      position: absolute;
      top: 30px;
      right: 40px;
      color: #fff;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      text-shadow: 0 0 6px #f44336;
    }

    .close:hover { color: #f44336; }

    /* Navigation arrows */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 50px;
      font-weight: bold;
      color: #f44336;
      cursor: pointer;
      user-select: none;
      padding: 10px;
      text-shadow: 0 0 6px #f44336;
    }

    .arrow:hover { color: #fff; }
    .arrow.left { left: 20px; }
    .arrow.right { right: 20px; }

    /* Responsive */
    @media (max-width: 480px) {
      .home-icon { width: 35px; height: 35px; }
      .grid img { width: 120px; height: 120px; }
      .title-img { width: 90%; }
    }
  </style>
</head>
<body>

  <!-- Fixed Title Section -->
  <div class="title-container">
    <img src="boc.png" alt="Babes On Chain" class="title-img" id="title-img">
  </div>

  <!-- Main Content -->
  <div class="content" id="content">
    <div class="grid" id="grid">
      <div class="babe">
        <img src="babe1.png" alt="Isabelle">
        <h2>Isabelle</h2>
      </div>
      <div class="babe">
        <img src="babe2.png" alt="Natalie">
        <h2>Natalie</h2>
      </div>
      <div class="babe">
        <img src="babe3.png" alt="Sophia">
        <h2>Sophia</h2>
      </div>
      <div class="babe">
        <img src="babe4.png" alt="Charlotte">
        <h2>Charlotte</h2>
      </div>
      <div class="babe">
        <img src="babe5.png" alt="Rebecca">
        <h2>Rebecca</h2>
      </div>
      <div class="babe">
        <img src="babe6.png" alt="Isla">
        <h2>Isla</h2>
      </div>
      <div class="babe">
        <img src="babe7.png" alt="Bella">
        <h2>Bella</h2>
      </div>
      <div class="babe">
        <img src="babe8.png" alt="Emma">
        <h2>Emma</h2>
      </div>
      <div class="babe">
        <img src="babe9.png" alt="Daisy">
        <h2>Daisy</h2>
      </div>
    </div>

    <!-- Optional: series range -->
    <div class="bottom-number">#99001352 - #99001360</div>

    <!-- Home icon below the number -->
    <div class="home-icon-container">
      <a href="index.html">
        <img src="home2.png" alt="Back Home" class="home-icon">
      </a>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <span class="close">&times;</span>
    <span class="arrow left">&#10094;</span>
    <img class="modal-content" id="modal-img">
    <span class="arrow right">&#10095;</span>
  </div>

  <script>
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modal-img");
    const closeBtn = document.getElementsByClassName("close")[0];
    const leftArrow = document.querySelector(".arrow.left");
    const rightArrow = document.querySelector(".arrow.right");
    const babes = Array.from(document.querySelectorAll(".grid img"));
    const titleImg = document.getElementById("title-img");

    let currentIndex = 0;

    // Fade title on scroll
    window.addEventListener("scroll", () => {
      const fadePoint = 300;
      titleImg.style.opacity = Math.max(0, 1 - window.scrollY / fadePoint);
    });

    // Modal functionality
    babes.forEach((img, index) => {
      img.addEventListener("click", () => {
        currentIndex = index;
        modal.style.display = "block";
        modalImg.src = babes[currentIndex].src;
      });
    });

    closeBtn.onclick = () => { modal.style.display = "none"; }
    modal.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; }
    leftArrow.onclick = (e) => {
      e.stopPropagation();
      currentIndex = (currentIndex - 1 + babes.length) % babes.length;
      modalImg.src = babes[currentIndex].src;
    }
    rightArrow.onclick = (e) => {
      e.stopPropagation();
      currentIndex = (currentIndex + 1) % babes.length;
      modalImg.src = babes[currentIndex].src;
    }
  </script>
</body>
</html>
