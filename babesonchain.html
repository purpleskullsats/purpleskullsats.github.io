<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Babes On Chain Collection</title>

  <!-- Google Font: Playfair Display -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #000; /* black background */
      color: #eee;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    /* Matrix canvas */
    #matrix {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none; /* allow clicks through */
    }

    /* Title container at top */
    .title-container {
      text-align: center;
      margin-top: 20px;
      margin-bottom: 40px;
      position: relative;
      z-index: 2; /* above matrix */
    }

    .title-img {
      max-width: 300px; 
      width: 80%;
      height: auto;
      filter: drop-shadow(0 0 8px #FFD700) drop-shadow(0 0 16px #FFD700); /* yellow glow */
      cursor: pointer;
    }

    /* CTA message below title */
    .cta-message a {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: #FFD700;
      text-shadow: 0 0 4px #FFD700;
      margin-top: 10px;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s ease;
    }

    /* CTA hover glow animation */
    .cta-message a:hover {
      text-shadow: 0 0 8px #FFD700, 0 0 16px #FFD700;
      transform: scale(1.05);
    }

    .content {
      position: relative;
      z-index: 2; /* above matrix */
    }

    /* Babe grid */
    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 0 1rem 2rem 1rem;
    }

    .babe {
      text-align: center;
    }

    .grid img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border: 2px solid #f44336;
      border-radius: 8px;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
      background: #000;
      box-shadow: 0 0 8px #f44336;
    }

    .grid img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #f44336;
    }

    /* Sexy font for names */
    .babe h2 {
      font-family: 'Playfair Display', serif;
      margin-top: 8px;
      font-size: 1.2rem;
      color: #f44336;
    }

    /* Bottom number range */
    .bottom-number {
      font-size: 1rem;
      color: #f44336;
      text-shadow: 0 0 4px #f44336;
      margin: 2rem 0 10px 0;
    }

    /* Home icon */
    .home-icon-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .home-icon {
      width: 50px;
      height: 50px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .home-icon:hover {
      transform: scale(1.1);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      padding-top: 60px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.95);
    }

    .modal-content {
      margin: auto;
      display: block;
      max-width: 80%;
      max-height: 80%;
      border: 2px solid #f44336;
      border-radius: 8px;
      box-shadow: 0 0 20px #f44336;
      transition: transform 0.3s;
    }

    .close {
      position: absolute;
      top: 30px;
      right: 40px;
      color: #fff;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      text-shadow: 0 0 6px #f44336;
    }

    .close:hover { color: #f44336; }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 50px;
      font-weight: bold;
      color: #f44336;
      cursor: pointer;
      user-select: none;
      padding: 10px;
      text-shadow: 0 0 6px #f44336;
    }

    .arrow:hover { color: #fff; }
    .arrow.left { left: 20px; }
    .arrow.right { right: 20px; }

    /* Responsive */
    @media (max-width: 480px) {
      .home-icon { width: 35px; height: 35px; }
      .grid img { width: 120px; height: 120px; }
      .title-img { max-width: 200px; }
    }
  </style>
</head>
<body>

  <!-- Matrix Canvas -->
  <canvas id="matrix"></canvas>

  <!-- Title Section -->
  <div class="title-container">
    <a href="https://share.google/ENoiZtAoxqxgPQY5J" target="_blank">
      <img src="boc.png" alt="Babes On Chain" class="title-img">
    </a>
    <div class="cta-message">
      <a href="https://share.google/ENoiZtAoxqxgPQY5J" target="_blank">
        Click to explore the full collection
      </a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="content">
    <div class="grid">
      <div class="babe">
        <img src="babe1.png" alt="Isabelle">
        <h2>Isabelle</h2>
      </div>
      <div class="babe">
        <img src="babe2.png" alt="Natalie">
        <h2>Natalie</h2>
      </div>
      <div class="babe">
        <img src="babe3.png" alt="Sophia">
        <h2>Sophia</h2>
      </div>
      <div class="babe">
        <img src="babe4.png" alt="Charlotte">
        <h2>Charlotte</h2>
      </div>
      <div class="babe">
        <img src="babe5.png" alt="Rebecca">
        <h2>Rebecca</h2>
      </div>
      <div class="babe">
        <img src="babe6.png" alt="Isla">
        <h2>Isla</h2>
      </div>
      <div class="babe">
        <img src="babe7.png" alt="Bella">
        <h2>Bella</h2>
      </div>
      <div class="babe">
        <img src="babe8.png" alt="Emma">
        <h2>Emma</h2>
      </div>
      <div class="babe">
        <img src="babe9.png" alt="Daisy">
        <h2>Daisy</h2>
      </div>
    </div>

    <div class="bottom-number">#99001352 - #99001360</div>

    <div class="home-icon-container">
      <a href="index.html">
        <img src="home2.png" alt="Back Home" class="home-icon">
      </a>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <span class="close">&times;</span>
    <span class="arrow left">&#10094;</span>
    <img class="modal-content" id="modal-img">
    <span class="arrow right">&#10095;</span>
  </div>

  <script>
    // Matrix Effect
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = [];
    for (let x = 0; x < columns; x++) drops[x] = Math.random() * canvas.height;

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0,0,0,0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#1700b5';
      ctx.font = fontSize + 'px monospace';
      for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i * fontSize, drops[i]);
        drops[i] += fontSize;
        if (drops[i] > canvas.height && Math.random() > 0.975) drops[i] = 0;
      }
    }

    setInterval(drawMatrix, 50);

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Modal functionality
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modal-img");
    const closeBtn = document.getElementsByClassName("close")[0];
    const leftArrow = document.querySelector(".arrow.left");
    const rightArrow = document.querySelector(".arrow.right");
    const babes = Array.from(document.querySelectorAll(".grid img"));
    let currentIndex = 0;

    babes.forEach((img, index) => {
      img.addEventListener("click", () => {
        currentIndex = index;
        modal.style.display = "block";
        modalImg.src = babes[currentIndex].src;
      });
    });

    closeBtn.onclick = () => { modal.style.display = "none"; }
    modal.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; }
    leftArrow.onclick = (e) => {
      e.stopPropagation();
      currentIndex = (currentIndex - 1 + babes.length) % babes.length;
      modalImg.src = babes[currentIndex].src;
    }
    rightArrow.onclick = (e) => {
      e.stopPropagation();
      currentIndex = (currentIndex + 1) % babes.length;
      modalImg.src = babes[currentIndex].src;
    }
  </script>
</body>
</html>
